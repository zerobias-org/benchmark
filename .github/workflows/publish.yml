name: Publish Benchmark

on:
  push:
    branches: [main, qa, dev, uat]
    paths:
      - 'package/**'
      - '.github/workflows/publish.yml'
  workflow_dispatch:
    inputs:
      benchmark:
        description: 'Benchmark to publish (e.g. vendor/suite/version). Leave blank for all changed.'
        required: false

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  publish:
    uses: zerobias-org/devops/.github/workflows/zbb-publish-reusable.yml@main
    with:
      ghcr-namespace: zerobias-org
      dispatch-input-name: benchmark
      dispatch-input-value: ${{ inputs.benchmark }}
    secrets: inherit
